<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let lado, area
    alert("Vamos calcular a área do quadrado")
    lado = prompt("Digite o valor do lado: ")
    while(lado <= 0) {
        alert("Digite outro número.")
    }
    while(lado > 0) {
        area = lado * lado
    alert("A área do quadrado é: " + area)
    }
    
    </script>
</body>
</html>
